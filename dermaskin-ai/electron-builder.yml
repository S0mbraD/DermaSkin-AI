appId: com.dermaskin.ai
productName: DermaSkin AI
copyright: Copyright © 2026 DermaSkin Team

toolsets:
  winCodeSign: "1.1.0"

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraMetadata:
  main: dist-electron/main.cjs

asar: true
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup.${ext}
  signAndEditExecutable: false
  signtoolOptions:
    sign: null

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: DermaSkin AI

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: ${productName}-${version}.${ext}
